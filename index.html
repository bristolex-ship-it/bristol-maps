// SKU name cleaning
function skuBrand(raw) {
  const n = raw.toLowerCase();
  if (n.startsWith('snobby dankins')) return 'SD';
  if (n.startsWith('love ouid') || n.startsWith("love oui'd")) return 'LO';
  if (n.startsWith('senior moments')) return 'SM';
  return null;
}

function cleanSkuName(raw) {
  let name = raw.trim();
  // Strip brand prefix patterns
  name = name.replace(/^snobby\s+dankins\s*[-–]?\s*/i, '');
  name = name.replace(/^love\s+oui[d']?\s*[-–]?\s*/i, '');
  name = name.replace(/^senior\s+moments\s*[-–]?\s*/i, '');
  // Strip leading dash
  name = name.replace(/^[-–]\s*/, '').trim();
  if (name.length > 0) name = name.charAt(0).toUpperCase() + name.slice(1);
  return name;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Haversine distance in miles
function haversine(lat1, lng1, lat2, lng2) {
  var R = 3958.8; // Earth radius in miles
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Build popup HTML
function buildPopupHtml(store) {
  const addr = store.formattedAddress.replace(/, USA$/, '');
  let html = '<div class="popup-body">';
  html += `<div class="popup-name">${escHtml(store.name)}</div>`;
  html += `<div class="popup-info">&#128205; ${escHtml(addr)}</div>`;
  if (store.phone) {
    html += `<div class="popup-info">&#128222; <a href="tel:${store.phone.replace(/\D/g,'')}">${escHtml(store.phone)}</a></div>`;
  }
  if (store.website) {
    const display = store.website.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'');
    html += `<div class="popup-info">&#127760; <a href="${escHtml(store.website)}" target="_blank" rel="noopener noreferrer">${escHtml(display)}</a></div>`;
  }

  if (store.topSkus && store.topSkus.length > 0) {
    html += '<hr class="popup-divider">';
    html += '<div class="popup-products-header">&#8212; Available Products &#8212;</div>';

    const byBrand = {};
    for (const sku of store.topSkus) {
      const b = skuBrand(sku.name);
      if (!b) continue;
      if (!byBrand[b]) byBrand[b] = [];
      byBrand[b].push(cleanSkuName(sku.name));
    }

    for (const bCode of ['SD', 'LO', 'SM']) {
      if (!byBrand[bCode] || byBrand[bCode].length === 0) continue;
      const bInfo = BRAND_MAP[bCode];
      html += `<div class="popup-brand-section">`;
      html += `<div class="popup-brand-name ${bInfo.cls}">${bInfo.label}</div>`;
      for (const skuName of byBrand[bCode]) {
        html += `<div class="popup-sku">${escHtml(skuName)}</div>`;
      }
      html += '</div>';
    }
  } else {
    html += '<hr class="popup-divider">';
    html += '<div class="popup-no-products">Contact store for current availability.</div>';
  }
  html += '</div>';
  return html;
}

// Filter check
function storeMatchesFilters(store) {
  const typeOk = activeType === 'all' || store.types.includes(activeType);
  const brandOk = activeBrand === 'all' || store.brands.includes(activeBrand);
  let searchOk = true;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    searchOk = store.name.toLowerCase().includes(q)
      || store.city.toLowerCase().includes(q)
      || (store.zip || '').includes(q)
      || store.formattedAddress.toLowerCase().includes(q)
      || store.topSkus.some(function(s) { return s.name.toLowerCase().includes(q); });
  }
  return typeOk && brandOk && searchOk;
}

    STORES.forEach(function(store, idx) {
      var count = 0;
      store.topSkus.forEach(function(s) {
        if (s.name.toLowerCase().indexOf(q) !== -1) count++;
      });
      productMatches[idx] = count;
    });
  }

  // Build visible indices
  var visibleIndices = [];
  STORES.forEach(function(store, idx) {
    var visible = storeMatchesFilters(store);
    markers[idx].setIcon(visible ? iconActive : iconFaded);
    if (visible) visibleIndices.push(idx);
  });

  // Sort by distance if zip search, or by product match count if product search
  if (searchOrigin && Object.keys(storeDistances).length > 0) {
    visibleIndices.sort(function(a, b) { return (storeDistances[a] || 9999) - (storeDistances[b] || 9999); });
  } else if (isProductSearch) {
    visibleIndices.sort(function(a, b) { return (productMatches[b] || 0) - (productMatches[a] || 0); });
  }

  countEl.textContent = visibleIndices.length + ' store' + (visibleIndices.length !== 1 ? 's' : '');
  if (searchOrigin) {
    countEl.textContent += ' • sorted by distance';
  }

  if (visibleIndices.length === 0) {
    list.innerHTML = '<div class="no-results">No stores match your search.</div>';
    return;
  }

  visibleIndices.forEach(function(idx) {
    var store = STORES[idx];
    var item = document.createElement('div');
    item.className = 'store-item' + (activeMarkerIndex === idx ? ' highlighted' : '');
    item.dataset.idx = idx;

    var shortAddr = store.address
      ? store.address + ', ' + store.city + (store.zip ? ' ' + store.zip : '')
      : store.formattedAddress.replace(/, USA$/, '');

    var productCount = store.topSkus.length;
    var dots = store.brands.map(function(b) {
      var info = BRAND_MAP[b];
      return info ? '<span class="brand-dot ' + info.cls + '" title="' + info.label + '"></span>' : '';
    }).join('');

    var distHtml = '';
    if (searchOrigin && storeDistances[idx] !== undefined) {
      var miles = storeDistances[idx];
      distHtml = '<span class="store-item-distance">' + (miles < 1 ? '< 1 mi' : Math.round(miles) + ' mi') + '</span>';
    }

    var matchHtml = '';
    if (isProductSearch && productMatches[idx] > 0) {
      matchHtml = '<div class="store-item-product-match">✓ ' + productMatches[idx] + ' matching product' + (productMatches[idx] !== 1 ? 's' : '') + '</div>';
    }

    item.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
        '<div class="store-item-name">' + escHtml(store.name) + '</div>' +
        distHtml +
      '</div>' +
      '<div class="store-item-address">' + escHtml(shortAddr) + '</div>' +
      matchHtml +
      '<div class="store-item-meta">' +
        '<span class="store-item-count">' + (productCount > 0 ? productCount + ' product' + (productCount !== 1 ? 's' : '') : 'Carrying our brands') + '</span>' +
        '<div class="brand-dots">' + dots + '</div>' +
      '</div>';

    item.addEventListener('click', function() { setActiveStore(idx, true); });
    list.appendChild(item);
  });

  // If zip search, zoom map to show closest stores
  if (searchOrigin && visibleIndices.length > 0) {
    var bounds = L.latLngBounds([]);
    bounds.extend([searchOrigin.lat, searchOrigin.lng]);
    var showCount = Math.min(5, visibleIndices.length);
    for (var i = 0; i < showCount; i++) {
      var s = STORES[visibleIndices[i]];
      bounds.extend([s.lat, s.lng]);
    }
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 11 });
  }
}

// Set active store
function setActiveStore(idx, flyFromSidebar) {
  activeMarkerIndex = idx;

  document.querySelectorAll('.store-item').forEach(function(el) { el.classList.remove('highlighted'); });
  const target = document.querySelector(`.store-item[data-idx="${idx}"]`);
  if (target) {
    target.classList.add('highlighted');
    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  if (flyFromSidebar) {
    // Close sidebar on mobile so user sees the map
    if (isMobile()) {
      sidebar.classList.remove('open');
      toggleBtn.textContent = '☰';
    }
    map.flyTo([STORES[idx].lat, STORES[idx].lng], 14, { duration: 0.8 });
    setTimeout(function() { markers[idx].openPopup(); }, 850);
  } else {
    markers[idx].openPopup();
  }
}

// Filter pills
document.querySelectorAll('[data-filter-type="type"]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-filter-type="type"]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeType = btn.dataset.value;
    renderSidebar();
  });
});

document.querySelectorAll('[data-filter-type="brand"]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-filter-type="brand"]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeBrand = btn.dataset.value;
    renderSidebar();
  });
});

// Search with zip code proximity detection
var searchTimer;
document.getElementById('search-input').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    searchQuery = e.target.value.trim();
    searchOrigin = null; // reset

    // Detect 5-digit zip code
    if (/^\d{5}$/.test(searchQuery)) {
      // Check our store zip lookup first
      if (zipCoords[searchQuery]) {
        searchOrigin = zipCoords[searchQuery];
        renderSidebar();
      } else {
        // Use Nominatim to geocode unknown zip codes
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://nominatim.openstreetmap.org/search?postalcode=' + searchQuery + '&country=US&state=New+York&format=json&limit=1');
        xhr.onload = function() {
          if (xhr.status === 200) {
            try {
              var results = JSON.parse(xhr.responseText);
              if (results.length > 0) {
                searchOrigin = { lat: parseFloat(results[0].lat), lng: parseFloat(results[0].lon) };
              }
            } catch(ex) {}
          }
          renderSidebar();
        };
        xhr.onerror = function() { renderSidebar(); };
        xhr.send();
        return; // don't render yet, wait for geocode
      }
    } else {
      renderSidebar();
    }
  }, 300);
});

// Layout sizing — explicit height calc + Leaflet recalc
function recalcLayout() {
  var header = document.getElementById('header');
  var filterBar = document.getElementById('filter-bar');
  var footer = document.getElementById('footer');
  var layout = document.getElementById('layout');
  var headerH = header ? header.offsetHeight : 56;
  var filterH = filterBar ? filterBar.offsetHeight : 60;
  var footerH = footer ? footer.offsetHeight : 36;
  var h = window.innerHeight - headerH - filterH - footerH;
  if (h < 200) h = 200;
  layout.style.height = h + 'px';
  setTimeout(function() { map.invalidateSize(); }, 100);
}

recalcLayout();
window.addEventListener('resize', recalcLayout);
// Safari fires orientationchange separately
window.addEventListener('orientationchange', function() {
  setTimeout(recalcLayout, 300);
});

// Mobile sidebar toggle
var toggleBtn = document.getElementById('sidebar-toggle');
var sidebar = document.getElementById('sidebar');
toggleBtn.addEventListener('click', function() {
  sidebar.classList.toggle('open');
  toggleBtn.textContent = sidebar.classList.contains('open') ? '✕' : '☰';
  setTimeout(function() { map.invalidateSize(); }, 350);
});

// Close sidebar when a store is clicked on mobile
function isMobile() { return window.innerWidth <= 768; }

// Initial render
renderSidebar();
</script>
